<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Whatnot Video Skip</title>
    <style>
      :root {
        --bg: #0f1419;
        --surface: #1a2332;
        --text: #e8eef4;
        --muted: #8b9cb3;
        --accent: #5b9cf5;
        --accent-hover: #7aadff;
        --radius: 10px;
        --font: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-width: 280px;
        padding: 18px 20px 20px;
        font-family: var(--font);
        font-size: 14px;
        color: var(--text);
        background: var(--bg);
        line-height: 1.45;
      }

      h1 {
        margin: 0 0 4px;
        font-size: 15px;
        font-weight: 600;
        letter-spacing: -0.02em;
      }

      p.sub {
        margin: 0 0 18px;
        font-size: 12px;
        color: var(--muted);
      }

      label {
        display: block;
        margin-bottom: 8px;
        font-size: 12px;
        font-weight: 500;
        color: var(--muted);
      }

      .row {
        display: flex;
        gap: 10px;
        align-items: stretch;
      }

      input[type="number"] {
        flex: 1;
        min-width: 0;
        padding: 10px 12px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: var(--radius);
        background: var(--surface);
        color: var(--text);
        font-size: 15px;
        font-variant-numeric: tabular-nums;
      }

      input[type="number"]:focus {
        outline: none;
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(91, 156, 245, 0.2);
      }

      button {
        padding: 10px 18px;
        border: none;
        border-radius: var(--radius);
        background: var(--accent);
        color: #0a0e14;
        font-size: 13px;
        font-weight: 600;
        font-family: inherit;
        cursor: pointer;
        white-space: nowrap;
        transition: background 0.15s ease;
      }

      button:hover {
        background: var(--accent-hover);
      }

      button:active {
        transform: scale(0.98);
      }

      .status {
        margin-top: 14px;
        min-height: 18px;
        font-size: 12px;
        font-weight: 500;
        color: #6bcf7f;
        opacity: 0;
        transition: opacity 0.2s ease;
      }

      .status.visible {
        opacity: 1;
      }
    </style>
  </head>
  <body>
    <h1>Video receipt skip</h1>
    <p class="sub">Adds this many seconds after the time Whatnot opens the receipt (not from 0:00 of the file).</p>
    <label for="skipSeconds">Seconds after receipt start</label>
    <div class="row">
      <input
        id="skipSeconds"
        type="number"
        min="0"
        max="600"
        step="1"
        value="28"
        inputmode="numeric"
      />
      <button type="button" id="save">Save</button>
    </div>
    <div id="status" class="status" role="status" aria-live="polite"></div>
    <script src="popup.js"></script>
  </body>
</html>
